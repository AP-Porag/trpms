name: 🚀 Deploy TRPMS (Laravel 12 + Inertia + React) to Hostinger staging

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup PHP
      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo_mysql
          tools: composer:v2

      # 3️⃣ Install Composer dependencies
      - name: 📦 Install Composer dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
#          composer install \
#            --no-dev \
#            --prefer-dist \
#            --optimize-autoloader \
#            --no-interaction

      # 4️⃣ Setup Node
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 5️⃣ Install NPM dependencies
      - name: 📦 Install NPM dependencies
        run: npm ci

      # 6️⃣ Build React / Inertia (Vite)
      - name: ⚛️ Build frontend assets
        run: npm run build

      - name: Remove node_modules to save inodes
        run: rm -rf node_modules

      # 7️⃣ Prepare environment file (CI only)
      - name: ⚙️ Prepare .env
        run: php -r "file_exists('.env') || copy('.env.staging', '.env');"

      - name: 🚀 Deploy to Hostinger via SCP (SSH)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: madbrain.dev
          username: u241149697
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          source: "."
          target: "/home/u241149697/domains/madbrain.dev/public_html/trpms"
          rm: false
          strip_components: 0

      - name: ⚙️ Run Laravel Artisan Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: madbrain.dev
          username: u241149697
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          script: |
            cd /home/u241149697/domains/madbrain.dev/public_html/trpms

            /opt/alt/php84/usr/bin/php artisan optimize:clear
            /opt/alt/php84/usr/bin/php artisan storage:link || true
            /opt/alt/php84/usr/bin/php artisan cache:clear
            /opt/alt/php84/usr/bin/php artisan view:clear
            /opt/alt/php84/usr/bin/php artisan route:clear
            /opt/alt/php84/usr/bin/php artisan optimize


        # 9️⃣ (Optional) Done message
      - name: ✅ Deployment finished
        run: echo "Laravel deployed successfully "

